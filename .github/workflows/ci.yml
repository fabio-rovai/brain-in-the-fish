name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
    steps:
      - uses: actions/checkout@v4
      - name: Checkout open-ontologies dependency
        uses: actions/checkout@v4
        with:
          repository: fabio-rovai/open-ontologies
          path: open-ontologies
      - name: Fix dependency path
        run: sed -i 's|path = "../open-ontologies"|path = "open-ontologies"|' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings
